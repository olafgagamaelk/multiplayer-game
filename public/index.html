<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shooter</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput">
    <button id="btn">name</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const c = document.getElementById("c");
const ctx = c.getContext("2d");

let myId;

let players = {};
let bullets = [];
let walls = [];

let me = { x:200, y:200 };
let keys = {};
let lastSend = 0;

// resize
function resize(){
    c.width = innerWidth;
    c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// SOCKET SPLIT (vigtigt for performance)
socket.on("id", id => myId = id);

socket.on("players", p => players = p);
socket.on("bullets", b => bullets = b);
socket.on("walls", w => walls = w);

// name
document.getElementById("btn").onclick = () => {
    socket.emit("name", document.getElementById("nameInput").value);
};

// input
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// shoot
addEventListener("mousedown", e => {

    const angle = Math.atan2(
        e.clientY - me.y,
        e.clientX - me.x
    );

    socket.emit("shoot", {
        x: me.x + 15,
        y: me.y + 15,
        vx: Math.cos(angle) * 9,
        vy: Math.sin(angle) * 9
    });
});

// movement (THROTTLED HARD)
function update(){

    let moved = false;

    if(keys["w"]){ me.y -= 5; moved = true; }
    if(keys["s"]){ me.y += 5; moved = true; }
    if(keys["a"]){ me.x -= 5; moved = true; }
    if(keys["d"]){ me.x += 5; moved = true; }

    if(moved && Date.now() - lastSend > 50){
        socket.emit("move", me);
        lastSend = Date.now();
    }
}

// draw wall
function drawWall(w){
    ctx.save();
    ctx.translate(w.x + w.w/2, w.y + w.h/2);
    ctx.rotate(w.rot);
    ctx.fillRect(-w.w/2, -w.h/2, w.w, w.h);
    ctx.restore();
}

// draw
function draw(){

    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0,0,c.width,c.height);

    // walls
    ctx.fillStyle = "#666";
    for(const w of walls){
        drawWall(w);
    }

    // bullets
    ctx.fillStyle = "yellow";
    for(const b of bullets){
        ctx.fillRect(b.x, b.y, 4, 4);
    }

    // players
    for(const id in players){

        const p = players[id];

        ctx.fillStyle = id === myId ? "red" : "blue";
        ctx.fillRect(p.x, p.y, 30, 30);

        ctx.fillStyle = "white";
        ctx.fillText(p.name + " HP:" + p.hp, p.x, p.y - 5);
    }
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
