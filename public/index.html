<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Shooter</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" placeholder="Navn">
    <button id="btn">Gem</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const c = document.getElementById("c");
const ctx = c.getContext("2d");

let myId = null;

let state = {
    players: {},
    bullets: [],
    walls: []
};

let me = { x: 200, y: 200 };
let keys = {};
let lastSend = 0;

// resize
function resize(){
    c.width = innerWidth;
    c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// socket
socket.on("id", id => myId = id);

// IMPORTANT FIX (no lag overwrite bugs)
socket.on("state", s => {
    state.players = s.players;
    state.bullets = s.bullets;
    state.walls = s.walls;
});

// name
document.getElementById("btn").onclick = () => {
    socket.emit("name", document.getElementById("nameInput").value);
};

// movement input
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// shoot
addEventListener("mousedown", e => {

    const angle = Math.atan2(
        e.clientY - me.y,
        e.clientX - me.x
    );

    socket.emit("shoot", {
        x: me.x + 15,
        y: me.y + 15,
        vx: Math.cos(angle) * 9,
        vy: Math.sin(angle) * 9
    });
});

// update movement
function update(){

    let moved = false;

    if(keys["w"]){ me.y -= 5; moved = true; }
    if(keys["s"]){ me.y += 5; moved = true; }
    if(keys["a"]){ me.x -= 5; moved = true; }
    if(keys["d"]){ me.x += 5; moved = true; }

    if(moved && Date.now() - lastSend > 30){
        socket.emit("move", me);
        lastSend = Date.now();
    }
}

// draw rotated wall
function drawRot(x,y,w,h,r){
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.rotate(r);
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.restore();
}

// draw
function draw(){

    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0,0,c.width,c.height);

    // walls
    ctx.fillStyle = "#666";
    for(const w of state.walls){
        drawRot(w.x,w.y,w.w,w.h,w.rot);
    }

    // bullets
    ctx.fillStyle = "yellow";
    for(const b of state.bullets){
        ctx.fillRect(b.x,b.y,4,4);
    }

    // players
    for(const id in state.players){

        const p = state.players[id];

        ctx.fillStyle = id === myId ? "red" : "blue";
        ctx.fillRect(p.x,p.y,30,30);

        ctx.fillStyle = "white";
        ctx.fillText(p.name + " HP:" + p.hp, p.x, p.y - 5);
    }

    // crosshair
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.arc(me.x + 15, me.y + 15, 5, 0, Math.PI * 2);
    ctx.stroke();
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
