<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Shooter</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial,sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:10px;left:10px;z-index:10;}
#nameInput,#saveBtn{padding:8px;}
</style>
</head>
<body>
<div id="ui">
<input id="nameInput" maxlength="12" placeholder="Dit navn">
<button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId=null;
let players={};
let bullets=[];
let renderPlayers={};

const MAP_WIDTH=1400;
const MAP_HEIGHT=900;
const PLAYER_SIZE=30;
const SPEED=2.6;

const me={x:700,y:450};
let camX=0, camY=0;
const keys={};
let lastSend=0;

let mouseX=0, mouseY=0;

function lerp(a,b,t){return a+(b-a)*t;}

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

socket.on("id",id=>myId=id);

socket.on("state",data=>{
 players=data.players||{};
 bullets=data.bullets||[];

 for(const id in players){
   if(!renderPlayers[id]){
     renderPlayers[id]={x:players[id].x,y:players[id].y};
   }
 }

 if(myId){
   if(!players[myId]) players[myId]={};
   players[myId].x=me.x;
   players[myId].y=me.y;
 }
});

document.getElementById("saveBtn").onclick=()=>{
 socket.emit("name",document.getElementById("nameInput").value);
};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.addEventListener("mousemove",e=>{
 mouseX=e.clientX;
 mouseY=e.clientY;
});

document.addEventListener("mousedown",()=>{
 const centerX=me.x-camX+PLAYER_SIZE/2;
 const centerY=me.y-camY+PLAYER_SIZE/2;
 const angle=Math.atan2(mouseY-centerY,mouseX-centerX);
 socket.emit("shoot",{angle});
});

function movePlayer(dx,dy){
 me.x+=dx;
 me.y+=dy;
}

function update(){
 let moved=false;

 if(keys["w"]){movePlayer(0,-SPEED);moved=true;}
 if(keys["s"]){movePlayer(0,SPEED);moved=true;}
 if(keys["a"]){movePlayer(-SPEED,0);moved=true;}
 if(keys["d"]){movePlayer(SPEED,0);moved=true;}

 me.x=Math.max(0,Math.min(MAP_WIDTH-PLAYER_SIZE,me.x));
 me.y=Math.max(0,Math.min(MAP_HEIGHT-PLAYER_SIZE,me.y));

 if(moved && Date.now()-lastSend>50){
   socket.emit("move",{x:me.x,y:me.y});
   lastSend=Date.now();
 }

 const targetCamX=me.x-canvas.width/2+PLAYER_SIZE/2;
 const targetCamY=me.y-canvas.height/2+PLAYER_SIZE/2;
 camX=lerp(camX,targetCamX,0.08);
 camY=lerp(camY,targetCamY,0.08);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#57c76d";
 ctx.fillRect(-camX,-camY,MAP_WIDTH,MAP_HEIGHT);

 ctx.strokeStyle="white";
 ctx.lineWidth=4;
 ctx.strokeRect(-camX,-camY,MAP_WIDTH,MAP_HEIGHT);

 ctx.fillStyle="red";
 ctx.fillRect(me.x-camX,me.y-camY,PLAYER_SIZE,PLAYER_SIZE);

 if(players[myId]){
   ctx.fillStyle="white";
   ctx.textAlign="center";
   ctx.fillText(
     `${players[myId].name || "Player"} (${players[myId].hp ?? 100})`,
     me.x-camX+15,
     me.y-camY-10
   );
 }

 for(const id in players){
   if(id===myId) continue;

   const p=players[id];
   const rp=renderPlayers[id];
   if(!rp) continue;

   rp.x=lerp(rp.x,p.x,0.2);
   rp.y=lerp(rp.y,p.y,0.2);

   ctx.fillStyle="blue";
   ctx.fillRect(rp.x-camX,rp.y-camY,PLAYER_SIZE,PLAYER_SIZE);

   ctx.fillStyle="white";
   ctx.fillText(
     `${p.name || "Player"} (${p.hp ?? 100})`,
     rp.x-camX+15,
     rp.y-camY-10
   );
 }

 ctx.fillStyle="yellow";
 for(const b of bullets){
   ctx.beginPath();
   ctx.arc(b.x-camX,b.y-camY,5,0,Math.PI*2);
   ctx.fill();
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
