<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Simple Multiplayer</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #2ecc71; /* grøn baggrund */
    font-family: Arial;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" placeholder="Dit navn">
    <button id="btn">Gem</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let myId = null;
let players = {};

let me = { x: 200, y: 200 };
let keys = {};
let lastSend = 0;

// resize
function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// socket
socket.on("id", id => myId = id);
socket.on("state", data => players = data);

// name
document.getElementById("btn").onclick = () => {
    socket.emit("name", document.getElementById("nameInput").value);
};

// input
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// movement
function update(){

    let moved = false;

    if(keys["w"]){ me.y -= 5; moved = true; }
    if(keys["s"]){ me.y += 5; moved = true; }
    if(keys["a"]){ me.x -= 5; moved = true; }
    if(keys["d"]){ me.x += 5; moved = true; }

    if(moved && Date.now() - lastSend > 30){
        socket.emit("move", me);
        lastSend = Date.now();
    }
}

// draw
function draw(){

    ctx.fillStyle = "#2ecc71"; // grøn baggrund
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for(const id in players){

        const p = players[id];

        ctx.fillStyle = id === myId ? "red" : "blue";
        ctx.fillRect(p.x, p.y, 30, 30);

        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText(p.name, p.x, p.y - 5);
    }
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
