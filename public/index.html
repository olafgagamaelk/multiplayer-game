<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooter</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px;z-index:10}
</style>
</head>
<body>

<div id="ui">
<input id="nameInput" placeholder="Navn">
<button id="btn">Gem</button>
</div>

<canvas id="c"></canvas>
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let myId;
let players = {};
let bullets = {};

const me = {x:100,y:100};
const keys = {};
let lastSend = 0;

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

socket.on("yourId", id => myId = id);

socket.on("state", data => {
  players = data.players;
  bullets = data.bullets;
});

document.getElementById("btn").onclick = () => {
  socket.emit("setName", document.getElementById("nameInput").value);
};

addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// movement
function update(){
  let moved = false;

  if(keys["w"]){me.y-=4;moved=true}
  if(keys["s"]){me.y+=4;moved=true}
  if(keys["a"]){me.x-=4;moved=true}
  if(keys["d"]){me.x+=4;moved=true}

  if(moved && Date.now()-lastSend>40){
    socket.emit("move", me);
    lastSend = Date.now();
  }
}

// shoot
addEventListener("mousedown", e => {

  const angle = Math.atan2(
    e.clientY - me.y,
    e.clientX - me.x
  );

  socket.emit("shoot", {
    x: me.x+20,
    y: me.y+20,
    vx: Math.cos(angle)*8,
    vy: Math.sin(angle)*8
  });
});

// draw
function draw(){

  ctx.fillStyle="#2e8b57";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(const id in players){
    const p = players[id];

    ctx.fillStyle = id===myId?"red":"blue";
    ctx.fillRect(p.x,p.y,40,40);

    ctx.fillStyle="white";
    ctx.fillText(p.name+" HP:"+p.hp, p.x, p.y-5);
  }

  ctx.fillStyle="yellow";
  for(const b of bullets){
    ctx.fillRect(b.x,b.y,5,5);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
