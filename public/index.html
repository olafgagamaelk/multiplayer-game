<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Multiplayer Smooth</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#2ecc71;
    font-family:Arial;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" placeholder="navn">
    <button id="btn">gem</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let myId = null;

let serverPlayers = {};
let renderPlayers = {};

let me = {
    x:200,
    y:200
};

let keys = {};
let lastSend = 0;

function lerp(a,b,t){
    return a + (b-a)*t;
}

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();
window.addEventListener("resize", resize);

socket.on("id", id=>{
    myId = id;
});

socket.on("state", data=>{
    serverPlayers = data;

    for(const id in data){

        if(!renderPlayers[id]){
            renderPlayers[id] = {
                x:data[id].x,
                y:data[id].y
            };
        }
    }
});

document.getElementById("btn").onclick = ()=>{

    socket.emit(
        "name",
        document.getElementById("nameInput").value
    );

};

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

function update(){

    let moved = false;

    if(keys["w"]){
        me.y -= 5;
        moved = true;
    }

    if(keys["s"]){
        me.y += 5;
        moved = true;
    }

    if(keys["a"]){
        me.x -= 5;
        moved = true;
    }

    if(keys["d"]){
        me.x += 5;
        moved = true;
    }

    if(moved && Date.now() - lastSend > 30){

        socket.emit("move",{
            x:me.x,
            y:me.y
        });

        lastSend = Date.now();
    }
}

function draw(){

    ctx.fillStyle="#2ecc71";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(const id in serverPlayers){

        const p = serverPlayers[id];

        if(id === myId){

            me.x = lerp(me.x,p.x,0.35);
            me.y = lerp(me.y,p.y,0.35);

            ctx.fillStyle="red";

            ctx.fillRect(
                me.x,
                me.y,
                30,
                30
            );

            ctx.fillStyle="white";

            ctx.fillText(
                p.name,
                me.x,
                me.y - 5
            );

        }else{

            const rp = renderPlayers[id];

            rp.x = lerp(
                rp.x,
                p.x,
                0.15
            );

            rp.y = lerp(
                rp.y,
                p.y,
                0.15
            );

            ctx.fillStyle="blue";

            ctx.fillRect(
                rp.x,
                rp.y,
                30,
                30
            );

            ctx.fillStyle="white";

            ctx.fillText(
                p.name,
                rp.x,
                rp.y - 5
            );
        }
    }

    requestAnimationFrame(draw);
}

setInterval(update,16);

draw();

</script>

</body>
</html>
