<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shooter</title>
<style>
body{margin:0;overflow:hidden}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px}
</style>
</head>
<body>

<div id="ui">
<input id="name" placeholder="navn">
<button onclick="setName()">ok</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let id;
let state = {players:{},bullets:[]};

let me = {x:100,y:100};
let keys = {};
let last = 0;

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
onresize = resize;

socket.on("id", i => id = i);
socket.on("state", s => state = s);
socket.on("full", () => document.body.innerHTML = "FULL SERVER");

function setName(){
  socket.emit("name", document.getElementById("name").value);
}

addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// movement (smooth + throttled)
function update(){
  let moved = false;

  if(keys["w"]){me.y-=4;moved=true}
  if(keys["s"]){me.y+=4;moved=true}
  if(keys["a"]){me.x-=4;moved=true}
  if(keys["d"]){me.x+=4;moved=true}

  if(moved && Date.now()-last > 50){
    socket.emit("move", me);
    last = Date.now();
  }
}

// shoot
addEventListener("mousedown", e => {

  const angle = Math.atan2(
    e.clientY - me.y,
    e.clientX - me.x
  );

  socket.emit("shoot", {
    x: me.x + 15,
    y: me.y + 15,
    vx: Math.cos(angle) * 7,
    vy: Math.sin(angle) * 7
  });
});

// draw
function draw(){

  ctx.fillStyle = "#222";
  ctx.fillRect(0,0,c.width,c.height);

  // players
  for(const i in state.players){
    const p = state.players[i];

    ctx.fillStyle = i===id ? "red" : "blue";
    ctx.fillRect(p.x,p.y,30,30);

    ctx.fillStyle = "white";
    ctx.fillText(p.name+" "+p.hp, p.x, p.y-5);
  }

  // bullets
  ctx.fillStyle = "yellow";
  for(const b of state.bullets){
    ctx.fillRect(b.x,b.y,4,4);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
