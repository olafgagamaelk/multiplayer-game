<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Shooter</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

input {
    padding: 6px;
}
button {
    padding: 6px;
}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" placeholder="Navn">
    <button onclick="setName()">OK</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;

let state = {
    players: {},
    bullets: []
};

let me = {
    x: 200,
    y: 200
};

let keys = {};
let lastSend = 0;

// ─────────────────────────────
// SETUP
// ─────────────────────────────
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ─────────────────────────────
// SOCKET EVENTS
// ─────────────────────────────
socket.on("id", (id) => {
    myId = id;
});

socket.on("state", (s) => {
    state = s;
});

socket.on("full", () => {
    document.body.innerHTML = "<h1 style='color:white'>Server er fuld</h1>";
});

// ─────────────────────────────
// NAME
// ─────────────────────────────
function setName() {
    const name = document.getElementById("nameInput").value;
    socket.emit("name", name);
}

// ─────────────────────────────
// INPUT
// ─────────────────────────────
document.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

// ─────────────────────────────
// SHOOT (mouse direction)
// ─────────────────────────────
document.addEventListener("mousedown", (e) => {

    const angle = Math.atan2(
        e.clientY - me.y,
        e.clientX - me.x
    );

    socket.emit("shoot", {
        x: me.x + 15,
        y: me.y + 15,
        vx: Math.cos(angle) * 9,
        vy: Math.sin(angle) * 9
    });
});

// ─────────────────────────────
// UPDATE MOVEMENT
// ─────────────────────────────
function update() {

    let moved = false;

    if (keys["w"]) { me.y -= 5; moved = true; }
    if (keys["s"]) { me.y += 5; moved = true; }
    if (keys["a"]) { me.x -= 5; moved = true; }
    if (keys["d"]) { me.x += 5; moved = true; }

    if (moved && Date.now() - lastSend > 30) {
        socket.emit("move", me);
        lastSend = Date.now();
    }
}

// ─────────────────────────────
// DRAW GAME
// ─────────────────────────────
function draw() {

    // background
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // players
    for (const id in state.players) {

        const p = state.players[id];

        ctx.fillStyle = (id === myId) ? "#ff4444" : "#4488ff";
        ctx.fillRect(p.x, p.y, 30, 30);

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText("P", p.x + 10, p.y + 20);
    }

    // bullets
    ctx.fillStyle = "yellow";
    for (const b of state.bullets) {
        ctx.fillRect(b.x, b.y, 4, 4);
    }

    // crosshair
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(me.x + 15, me.y + 15, 5, 0, Math.PI * 2);
    ctx.stroke();
}

// ─────────────────────────────
// GAME LOOP
// ─────────────────────────────
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
