<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multiplayer</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#2ecc71;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

#nameInput{
    padding:8px;
    font-size:16px;
}

#saveBtn{
    padding:8px 12px;
    font-size:16px;
}

</style>
</head>
<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Dit navn">
    <button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;

let players = {};

const me = {
    x: 200,
    y: 200
};

const keys = {};
const speed = 5;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();

window.addEventListener("resize", resize);

socket.on("id", id => {
    myId = id;
});

socket.on("state", data => {

    players = data;

    // IGNORER SERVERENS POSITION AF DIG SELV

    if(myId){

        if(!players[myId]){
            players[myId] = {};
        }

        players[myId].x = me.x;
        players[myId].y = me.y;
    }
});

document.getElementById("saveBtn").onclick = () => {

    const name =
        document.getElementById("nameInput")
        .value
        .trim();

    socket.emit("name", name);
};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function update(){

    let moved = false;

    if(keys["w"]){
        me.y -= speed;
        moved = true;
    }

    if(keys["s"]){
        me.y += speed;
        moved = true;
    }

    if(keys["a"]){
        me.x -= speed;
        moved = true;
    }

    if(keys["d"]){
        me.x += speed;
        moved = true;
    }

    if(moved){

        socket.emit("move",{
            x: me.x,
            y: me.y
        });
    }
}

function draw(){

    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // TEGN DIG SELV DIREKTE FRA LOKAL POSITION

    ctx.fillStyle = "red";

    ctx.fillRect(
        me.x,
        me.y,
        30,
        30
    );

    if(players[myId]){

        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            players[myId].name || "Player",
            me.x + 15,
            me.y - 10
        );
    }

    // TEGN ALLE ANDRE

    for(const id in players){

        if(id === myId) continue;

        const p = players[id];

        ctx.fillStyle = "blue";

        ctx.fillRect(
            p.x,
            p.y,
            30,
            30
        );

        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            p.name || "Player",
            p.x + 15,
            p.y - 10
        );
    }
}

function gameLoop(){

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
