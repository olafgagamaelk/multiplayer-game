<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer OBB</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}
canvas{display:block;}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
#nameInput{padding:8px;}
#saveBtn{padding:8px 12px;}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Navn">
    <button id="saveBtn">Gem</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId;
let players = {};
let renderPlayers = {};

const MAP_W = 1400;
const MAP_H = 900;

const SIZE = 30;
const SPEED = 2.8;

const me = { x:700, y:450 };
const keys = {};

let camX = 0;
let camY = 0;

let lastSend = 0;

function lerp(a,b,t){
    return a + (b-a)*t;
}

/* ---------------- W E L L S (ROTEREDE) ---------------- */

const walls = [
    {x:200,y:200,w:250,h:40,a:20},
    {x:500,y:150,w:200,h:40,a:-25},
    {x:900,y:200,w:250,h:40,a:35},

    {x:300,y:400,w:40,h:250,a:10},
    {x:600,y:350,w:300,h:40,a:-15},

    {x:950,y:400,w:40,h:250,a:25},
    {x:1100,y:600,w:220,h:40,a:-30},

    {x:250,y:650,w:300,h:40,a:15},
    {x:700,y:600,w:40,h:250,a:-20},
    {x:900,y:700,w:300,h:40,a:10}
];

/* ---------------- ROTATION HELPERS ---------------- */

function toLocal(px, py, cx, cy, angle){
    const rad = -angle * Math.PI / 180;
    const s = Math.sin(rad);
    const c = Math.cos(rad);

    px -= cx;
    py -= cy;

    return {
        x: px * c - py * s,
        y: px * s + py * c
    };
}

/* ---------------- COLLISION OBB ---------------- */

function collideOBB(px,py,wall){

    const centerX = wall.x + wall.w/2;
    const centerY = wall.y + wall.h/2;

    const p = toLocal(px,py,centerX,centerY,wall.a);

    return (
        p.x > -wall.w/2 &&
        p.x < wall.w/2 &&
        p.y > -wall.h/2 &&
        p.y < wall.h/2
    );
}

/* ---------------- MOVEMENT ---------------- */

function move(dx,dy){

    let oldX = me.x;
    let oldY = me.y;

    me.x += dx;

    for(const w of walls){
        if(collideOBB(me.x,me.y,w)){
            me.x = oldX;
            break;
        }
    }

    me.y += dy;

    for(const w of walls){
        if(collideOBB(me.x,me.y,w)){
            me.y = oldY;
            break;
        }
    }
}

/* ---------------- SOCKET ---------------- */

socket.on("id", id => myId = id);

socket.on("state", data => {

    players = data;

    for(const id in players){
        if(!renderPlayers[id]){
            renderPlayers[id] = {
                x: players[id].x,
                y: players[id].y
            };
        }
    }

    if(myId){
        players[myId].x = me.x;
        players[myId].y = me.y;
    }
});

/* ---------------- INPUT ---------------- */

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});
document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

/* ---------------- CAMERA ---------------- */

function updateCam(){
    camX = lerp(camX, me.x - innerWidth/2, 0.1);
    camY = lerp(camY, me.y - innerHeight/2, 0.1);
}

/* ---------------- UPDATE ---------------- */

function update(){

    let moved = false;

    if(keys["w"]){ move(0,-SPEED); moved=true; }
    if(keys["s"]){ move(0,SPEED); moved=true; }
    if(keys["a"]){ move(-SPEED,0); moved=true; }
    if(keys["d"]){ move(SPEED,0); moved=true; }

    if(moved && Date.now()-lastSend>50){
        socket.emit("move",{x:me.x,y:me.y});
        lastSend = Date.now();
    }

    updateCam();
}

/* ---------------- DRAW ---------------- */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // grass
    ctx.fillStyle = "#57c76d";
    ctx.fillRect(-camX,-camY,MAP_W,MAP_H);

    // walls
    for(const w of walls){
        drawWall(w);
    }

    // me
    ctx.fillStyle="red";
    ctx.fillRect(me.x-camX,me.y-camY,SIZE,SIZE);

    // others
    for(const id in players){

        if(id === myId) continue;

        const p = players[id];
        const rp = renderPlayers[id];

        rp.x = lerp(rp.x,p.x,0.2);
        rp.y = lerp(rp.y,p.y,0.2);

        ctx.fillStyle="blue";
        ctx.fillRect(rp.x-camX,rp.y-camY,SIZE,SIZE);
    }
}

/* ---------------- WALL DRAW (ROTATED) ---------------- */

function drawWall(w){

    ctx.save();

    ctx.translate(
        w.x + w.w/2 - camX,
        w.y + w.h/2 - camY
    );

    ctx.rotate(w.a * Math.PI / 180);

    ctx.fillStyle="#777";
    ctx.fillRect(-w.w/2,-w.h/2,w.w,w.h);

    ctx.restore();
}

/* ---------------- LOOP ---------------- */

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
