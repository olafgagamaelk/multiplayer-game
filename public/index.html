<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer</title>
<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#111;
}
canvas{
    display:block;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
#nameInput{
    padding:8px;
}
#saveBtn{
    padding:8px 12px;
}
#damageOverlay{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    background:rgba(255,0,0,0);
    transition: background 0.1s;
    z-index:20;
}
#hud{
    position:fixed;
    bottom:20px;
    left:20px;
    color:white;
    font-size:20px;
    font-weight:bold;
    text-shadow:2px 2px 0 #000;
    z-index:15;
}
#reloadBar{
    position:fixed;
    bottom:50px;
    left:20px;
    width:120px;
    height:8px;
    background:#333;
    border:2px solid #fff;
    display:none;
    z-index:16;
}
#reloadFill{
    height:100%;
    background:#0f0;
    width:0%;
}
#weaponMenu{
    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:8px;
    z-index:30;
}
.weaponBtn{
    padding:8px 14px;
    background:#333;
    color:white;
    border:2px solid #555;
    cursor:pointer;
    font-weight:bold;
    border-radius:4px;
    transition:0.2s;
}
.weaponBtn.active{
    background:#c84;
    border-color:#ffa;
}
.weaponBtn:hover{
    background:#555;
}
#leaderboard{
    position:fixed;
    top:60px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:6px;
    font-size:14px;
    z-index:14;
    min-width:120px;
}
#leaderboard h3{
    margin:0 0 4px;
    font-size:16px;
    text-align:center;
}
#leaderboard ol{
    margin:0;
    padding-left:20px;
}
#killFeed{
    position:fixed;
    right:20px;
    top:120px;
    color:white;
    font-size:16px;
    text-shadow:1px 1px 0 black;
    z-index:25;
    pointer-events:none;
}
.killMsg{
    margin-bottom:4px;
}
</style>
</head>
<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Dit navn">
    <button id="saveBtn">Gem navn</button>
</div>
<div id="weaponMenu">
    <button class="weaponBtn active" data-weapon="revolver">🔫 Revolver</button>
    <button class="weaponBtn" data-weapon="shotgun">💥 Shotgun</button>
    <button class="weaponBtn" data-weapon="sniper">🔭 Sniper</button>
</div>
<div id="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <ol id="lbList"></ol>
</div>
<div id="killFeed"></div>
<div id="damageOverlay"></div>
<div id="hud">🔫 <span id="ammoDisplay">6/6</span></div>
<div id="reloadBar"><div id="reloadFill"></div></div>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const damageOverlay = document.getElementById("damageOverlay");
const ammoDisplay = document.getElementById("ammoDisplay");
const reloadBar = document.getElementById("reloadBar");
const reloadFill = document.getElementById("reloadFill");
const lbList = document.getElementById("lbList");
const killFeed = document.getElementById("killFeed");
const weaponBtns = document.querySelectorAll(".weaponBtn");

let myId = null;
let players = {};
let renderPlayers = {};
let bullets = [];

const MAP_WIDTH = 1400;
const MAP_HEIGHT = 900;
const PLAYER_SIZE = 30;
const SPEED = 2.6;

const walls = [
    {x:120,y:120,w:220,h:40,r:20},
    {x:450,y:90,w:180,h:40,r:-25},
    {x:850,y:130,w:240,h:40,r:15},
    {x:180,y:300,w:40,h:220,r:35},
    {x:500,y:260,w:280,h:40,r:-15},
    {x:980,y:250,w:40,h:240,r:10},
    {x:250,y:600,w:220,h:40,r:30},
    {x:650,y:540,w:40,h:220,r:-20},
    {x:900,y:650,w:260,h:40,r:12},
    {x:1080,y:430,w:180,h:40,r:-35},
    {x:320,y:430,w:160,h:40,r:45},
    {x:730,y:350,w:170,h:40,r:-40}
];

const decorations = [
    {x:200,y:200,type:"bush",size:14},
    {x:800,y:300,type:"rock",size:10},
    {x:1050,y:600,type:"bush",size:16},
    {x:400,y:700,type:"rock",size:12},
    {x:150,y:550,type:"bush",size:11},
    {x:950,y:180,type:"rock",size:8},
    {x:600,y:800,type:"bush",size:15},
    {x:1300,y:400,type:"rock",size:9},
    {x:50,y:80,type:"bush",size:10},
    {x:700,y:100,type:"rock",size:7},
    {x:1200,y:150,type:"bush",size:13},
    {x:350,y:150,type:"rock",size:9},
    {x:1100,y:750,type:"bush",size:12},
    {x:80,y:400,type:"rock",size:11},
    {x:550,y:850,type:"bush",size:14},
    {x:1000,y:50,type:"rock",size:6},
    {x:1300,y:850,type:"bush",size:10},
    {x:20,y:700,type:"rock",size:8},
];

const me = { x:700, y:450 };

let camX = 0, camY = 0;
let recoilX = 0, recoilY = 0;
let shakeX = 0, shakeY = 0;

const keys = {};
let lastSend = 0;
let lastShoot = 0;

// Våbensystem
const weapons = {
    revolver: {
        name: "Revolver",
        magSize: 6,
        reloadTime: 1500,
        shootCooldown: 200
    },
    shotgun: {
        name: "Shotgun",
        magSize: 2,
        reloadTime: 3000,
        shootCooldown: 800
    },
    sniper: {
        name: "Sniper",
        magSize: 1,
        reloadTime: 1800,
        shootCooldown: 1000
    }
};

let currentWeapon = "revolver";
let magazine = weapons.revolver.magSize;
let isReloading = false;
let reloadStart = 0;

let particles = [];

// ---------- hjælpefunktioner ----------
function lerp(a,b,t){ return a + (b-a)*t; }

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Våbenskift UI
weaponBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        const weapon = btn.dataset.weapon;
        if (weapon === currentWeapon) return;
        weaponBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentWeapon = weapon;
        const w = weapons[weapon];
        magazine = w.magSize;
        isReloading = false;
        reloadBar.style.display = "none";
        updateAmmoDisplay();
        socket.emit("changeWeapon", weapon);
    });
});

function updateAmmoDisplay(){
    const w = weapons[currentWeapon];
    ammoDisplay.textContent = `${magazine}/${w.magSize}`;
}

// ---------- NETVÆRK ----------
socket.on("id", id => myId = id);

socket.on("state", data => {
    players = data.players || {};
    bullets = data.bullets || [];

    for(const id in players){
        if(!renderPlayers[id]){
            renderPlayers[id] = {
                x: players[id].x,
                y: players[id].y
            };
        }
    }

    if(myId && players[myId]){
        const serverMe = players[myId];
        const dx = serverMe.x - me.x;
        const dy = serverMe.y - me.y;
        if(Math.sqrt(dx*dx+dy*dy) > 80){
            me.x = serverMe.x;
            me.y = serverMe.y;
        }
        players[myId].x = me.x;
        players[myId].y = me.y;
    }
});

socket.on("bulletHit", events => {
    for(const ev of events){
        if(ev.type === "player"){
            for(let i=0;i<14;i++){
                const angle = Math.random()*Math.PI*2;
                const speed = 2+Math.random()*5;
                particles.push({
                    x: ev.x, y: ev.y,
                    vx: Math.cos(angle)*speed,
                    vy: Math.sin(angle)*speed,
                    life: 30+Math.random()*20,
                    maxLife: 50,
                    color: `hsl(${Math.random()*20+350}, 100%, 60%)`,
                    size: 2+Math.random()*4
                });
            }
        } else if(ev.type === "wall"){
            for(let i=0;i<8;i++){
                const angle = Math.random()*Math.PI*2;
                const speed = 1+Math.random()*4;
                particles.push({
                    x: ev.x, y: ev.y,
                    vx: Math.cos(angle)*speed,
                    vy: Math.sin(angle)*speed,
                    life: 15+Math.random()*10,
                    maxLife: 25,
                    color: `hsl(${Math.random()*20+40}, 100%, ${60+Math.random()*40}%)`,
                    size: 1.5+Math.random()*3
                });
            }
        }
    }
});

socket.on("damaged", data => {
    damageOverlay.style.background = "rgba(255,0,0,0.6)";
    setTimeout(()=>{ damageOverlay.style.background = "rgba(255,0,0,0)"; }, 150);
    shakeX = (Math.random()-0.5)*20;
    shakeY = (Math.random()-0.5)*20;
});

// Leaderboard + kill feed
socket.on("state", () => {
    // Opdater leaderboard ved hver state (allerede kaldt)
    updateLeaderboard();
});

socket.on("killFeed", data => {
    const msg = document.createElement("div");
    msg.className = "killMsg";
    msg.textContent = data.killer + " 🔫 " + data.victim;
    killFeed.appendChild(msg);
    setTimeout(() => msg.remove(), 4000);
});

function updateLeaderboard(){
    const arr = Object.values(players);
    arr.sort((a,b) => (b.kills || 0) - (a.kills || 0));
    const top = arr.slice(0, 5);
    lbList.innerHTML = "";
    top.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p.name + " (" + (p.kills || 0) + ")";
        lbList.appendChild(li);
    });
}

// ---------- INPUT ----------
document.getElementById("saveBtn").onclick = () => {
    socket.emit("name", document.getElementById("nameInput").value);
};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === "r" && !isReloading && magazine < weapons[currentWeapon].magSize){
        startReload();
    }
});
document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

function startReload(){
    isReloading = true;
    reloadStart = Date.now();
    reloadBar.style.display = "block";
    reloadFill.style.width = "0%";
}

function finishReload(){
    magazine = weapons[currentWeapon].magSize;
    isReloading = false;
    reloadBar.style.display = "none";
    updateAmmoDisplay();
}

function updateReload(){
    if(isReloading){
        const elapsed = Date.now() - reloadStart;
        const reloadTime = weapons[currentWeapon].reloadTime;
        const progress = Math.min(elapsed / reloadTime, 1);
        reloadFill.style.width = (progress*100)+"%";
        if(elapsed >= reloadTime){
            finishReload();
        }
    }
}

// ---------- SKYD ----------
canvas.addEventListener("mousedown", e => {
    const w = weapons[currentWeapon];
    if(Date.now() - lastShoot < w.shootCooldown) return;
    if(isReloading) return;
    if(magazine <= 0) return;

    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const worldMX = mouseX + camX;
    const worldMY = mouseY + camY;
    const centerX = me.x + PLAYER_SIZE/2;
    const centerY = me.y + PLAYER_SIZE/2;
    const angle = Math.atan2(worldMY - centerY, worldMX - centerX);

    socket.emit("shoot", { angle, weapon: currentWeapon });

    magazine--;
    lastShoot = Date.now();
    updateAmmoDisplay();

    const recoilPower = currentWeapon === "shotgun" ? 12 : currentWeapon === "sniper" ? 15 : 8;
    recoilX -= Math.cos(angle) * recoilPower;
    recoilY -= Math.sin(angle) * recoilPower;

    shakeX = (Math.random()-0.5) * (currentWeapon === "sniper" ? 24 : 16);
    shakeY = (Math.random()-0.5) * (currentWeapon === "sniper" ? 24 : 16);

    const pushBack = currentWeapon === "shotgun" ? 4 : currentWeapon === "sniper" ? 5 : 3;
    me.x -= Math.cos(angle) * pushBack;
    me.y -= Math.sin(angle) * pushBack;
    me.x = Math.max(0, Math.min(MAP_WIDTH - PLAYER_SIZE, me.x));
    me.y = Math.max(0, Math.min(MAP_HEIGHT - PLAYER_SIZE, me.y));

    const muzzleX = centerX + Math.cos(angle)*14;
    const muzzleY = centerY + Math.sin(angle)*14;
    const particleCount = currentWeapon === "shotgun" ? 10 : 6;
    for(let i=0;i<particleCount;i++){
        const spread = (Math.random()-0.5)*0.6;
        particles.push({
            x: muzzleX, y: muzzleY,
            vx: Math.cos(angle+spread)*4,
            vy: Math.sin(angle+spread)*4,
            life: 6,
            maxLife: 6,
            color: "orange",
            size: 3+Math.random()*4
        });
    }

    if(magazine <= 0 && !isReloading){
        startReload();
    }
});

// ---------- KOLLISION ----------
function pointInRotatedRect(px, py, wall){
    const cx = wall.x + wall.w/2;
    const cy = wall.y + wall.h/2;
    const rad = -wall.r * Math.PI / 180;
    const dx = px - cx;
    const dy = py - cy;
    const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
    const localY = dx * Math.sin(rad) + dy * Math.cos(rad);
    return (
        localX > -wall.w/2 &&
        localX <  wall.w/2 &&
        localY > -wall.h/2 &&
        localY <  wall.h/2
    );
}

function pushOutOfWall(px, py, wall) {
    const cx = wall.x + wall.w/2;
    const cy = wall.y + wall.h/2;
    const rad = -wall.r * Math.PI / 180;
    const dx = px - cx;
    const dy = py - cy;
    const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
    const localY = dx * Math.sin(rad) + dy * Math.cos(rad);
    const halfW = wall.w/2;
    const halfH = wall.h/2;

    if (Math.abs(localX) <= halfW && Math.abs(localY) <= halfH) {
        const distLeft   = halfW + localX;
        const distRight  = halfW - localX;
        const distTop    = halfH + localY;
        const distBottom = halfH - localY;
        let pushLocal = { x: 0, y: 0 };
        const minDist = Math.min(distLeft, distRight, distTop, distBottom);
        if (minDist === distLeft)        pushLocal.x = -distLeft - 0.1;
        else if (minDist === distRight)  pushLocal.x = distRight + 0.1;
        else if (minDist === distTop)    pushLocal.y = -distTop - 0.1;
        else if (minDist === distBottom) pushLocal.y = distBottom + 0.1;
        const angle = -rad;
        return {
            dx: pushLocal.x * Math.cos(angle) - pushLocal.y * Math.sin(angle),
            dy: pushLocal.x * Math.sin(angle) + pushLocal.y * Math.cos(angle)
        };
    }
    return null;
}

function resolveCollisions() {
    const corners = [
        [me.x, me.y],
        [me.x + PLAYER_SIZE, me.y],
        [me.x, me.y + PLAYER_SIZE],
        [me.x + PLAYER_SIZE, me.y + PLAYER_SIZE]
    ];
    for (const wall of walls) {
        for (let i=0; i<4; i++) {
            const cx = corners[i][0], cy = corners[i][1];
            if (pointInRotatedRect(cx, cy, wall)) {
                const push = pushOutOfWall(cx, cy, wall);
                if (push) {
                    me.x += push.dx;
                    me.y += push.dy;
                    corners[0][0] = me.x; corners[0][1] = me.y;
                    corners[1][0] = me.x + PLAYER_SIZE; corners[1][1] = me.y;
                    corners[2][0] = me.x; corners[2][1] = me.y + PLAYER_SIZE;
                    corners[3][0] = me.x + PLAYER_SIZE; corners[3][1] = me.y + PLAYER_SIZE;
                }
            }
        }
    }
}

function movePlayer(dx, dy) {
    me.x += dx;
    me.y += dy;
    resolveCollisions();
    me.x = Math.max(0, Math.min(MAP_WIDTH - PLAYER_SIZE, me.x));
    me.y = Math.max(0, Math.min(MAP_HEIGHT - PLAYER_SIZE, me.y));
}

// ---------- UPDATE ----------
function update(){
    let moved = false;
    if(keys["w"]){ movePlayer(0,-SPEED); moved = true; }
    if(keys["s"]){ movePlayer(0, SPEED); moved = true; }
    if(keys["a"]){ movePlayer(-SPEED,0); moved = true; }
    if(keys["d"]){ movePlayer( SPEED,0); moved = true; }

    if(moved && Date.now() - lastSend > 50){
        socket.emit("move",{ x: me.x, y: me.y });
        lastSend = Date.now();
    }

    recoilX = lerp(recoilX, 0, 0.15);
    recoilY = lerp(recoilY, 0, 0.15);
    shakeX = lerp(shakeX, 0, 0.15);
    shakeY = lerp(shakeY, 0, 0.15);

    const targetCamX = me.x - canvas.width/2 + PLAYER_SIZE/2 + recoilX + shakeX;
    const targetCamY = me.y - canvas.height/2 + PLAYER_SIZE/2 + recoilY + shakeY;
    camX = lerp(camX, targetCamX, 0.08);
    camY = lerp(camY, targetCamY, 0.08);

    updateReload();

    for(let i=particles.length-1; i>=0; i--){
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if(p.life <= 0) particles.splice(i,1);
    }
}

// ---------- TEGNING ----------
function drawGrass(){
    ctx.fillStyle = "#5a9e4b";
    ctx.fillRect(-camX, -camY, MAP_WIDTH, MAP_HEIGHT);
    ctx.fillStyle = "#4f8e42";
    for(let y=-camY; y<MAP_HEIGHT-camY; y+=16){
        ctx.fillRect(-camX, y, MAP_WIDTH, 2);
    }
    ctx.strokeStyle = "#3d7030";
    ctx.lineWidth = 1;
    for(let x=-camX; x<MAP_WIDTH-camX; x+=18){
        for(let y=-camY; y<MAP_HEIGHT-camY; y+=22){
            ctx.beginPath();
            ctx.moveTo(x, y+2);
            ctx.lineTo(x+1, y-2);
            ctx.stroke();
        }
    }
}

function drawWallShadow(wall){
    ctx.save();
    ctx.translate(wall.x + wall.w/2 - camX + 4, wall.y + wall.h/2 - camY + 4);
    ctx.rotate(wall.r * Math.PI / 180);
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(-wall.w/2, -wall.h/2, wall.w, wall.h);
    ctx.restore();
}

function drawWall(wall){
    ctx.save();
    ctx.translate(wall.x + wall.w/2 - camX, wall.y + wall.h/2 - camY);
    ctx.rotate(wall.r * Math.PI / 180);
    ctx.fillStyle = "#8a8a8a";
    ctx.fillRect(-wall.w/2, -wall.h/2, wall.w, wall.h);
    ctx.fillStyle = "#6e6e6e";
    const brickW = 16, brickH = 10;
    const seed = wall.x * 31 + wall.y * 17;
    for(let bx = -wall.w/2; bx < wall.w/2; bx += brickW + 3){
        for(let by = -wall.h/2; by < wall.h/2; by += brickH + 2){
            const w = brickW * (0.6 + ((bx*7 + by*13 + seed) % 10) / 25);
            const h = brickH * (0.6 + ((bx*3 + by*11 + seed) % 10) / 25);
            ctx.fillRect(bx, by, w, h);
        }
    }
    ctx.strokeStyle = "#505050";
    ctx.lineWidth = 2;
    ctx.strokeRect(-wall.w/2, -wall.h/2, wall.w, wall.h);
    ctx.restore();
}

function drawDecorations(){
    for(const d of decorations){
        const sx = d.x - camX;
        const sy = d.y - camY;
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        if(d.type === "bush"){
            ctx.arc(sx+2, sy+3, d.size, 0, Math.PI*2);
        } else {
            ctx.fillRect(sx-d.size/2+2, sy-d.size/2+3, d.size, d.size);
        }
        ctx.fill();
        if(d.type === "bush"){
            ctx.fillStyle = "#3b5e1f";
            ctx.beginPath();
            ctx.arc(sx, sy, d.size, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#4b7029";
            const seed = d.x * 37 + d.y * 13;
            for(let i=0;i<5;i++){
                const angle = ((seed + i*71) % 360) * Math.PI/180;
                const dist = ((seed + i*47) % 100) / 100 * d.size * 0.7;
                const ax = sx + Math.cos(angle)*dist;
                const ay = sy + Math.sin(angle)*dist;
                ctx.beginPath();
                ctx.arc(ax, ay, d.size/5, 0, Math.PI*2);
                ctx.fill();
            }
        } else {
            ctx.fillStyle = "#6b6b6b";
            ctx.fillRect(sx-d.size/2, sy-d.size/2, d.size, d.size);
            ctx.fillStyle = "#545454";
            ctx.fillRect(sx-d.size/2+2, sy-d.size/2+2, d.size-4, d.size-4);
        }
    }
}

function drawHealthBar(p, screenX, screenY) {
    if (typeof p.hp !== "number") return;
    const hp = Math.max(0, p.hp);
    const w = PLAYER_SIZE;
    const h = 6;
    const x = screenX;
    const y = screenY - 12; // Lidt tættere på spilleren
    ctx.fillStyle = "#222";
    ctx.fillRect(x, y, w, h);
    const fill = (hp / 100) * w;
    ctx.fillStyle = hp > 30 ? "#4f4" : "#f44";
    ctx.fillRect(x, y, fill, h);
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
}

function drawPlayerShadow(sx, sy){
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.beginPath();
    ctx.ellipse(sx+PLAYER_SIZE/2, sy+PLAYER_SIZE+2, PLAYER_SIZE/2, PLAYER_SIZE/4, 0, 0, Math.PI*2);
    ctx.fill();
}

// --- VÅBENMODELLER (peger altid i musens retning) ---
function drawRevolver(cx, cy, angle){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    // Løb
    ctx.fillStyle = "#3a3a3a";
    ctx.fillRect(6, -2, 16, 4);
    ctx.fillStyle = "#555";
    ctx.fillRect(20, -1.5, 3, 3);

    // Tromle
    ctx.fillStyle = "#2a2a2a";
    ctx.beginPath();
    ctx.ellipse(2, 0, 7, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#555";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(2, 0, 7, 5, 0, 0, Math.PI*2);
    ctx.stroke();
    for(let i=0;i<6;i++){
        const a = i * Math.PI/3;
        ctx.fillStyle = "#444";
        ctx.beginPath();
        ctx.arc(2 + Math.cos(a)*4.5, Math.sin(a)*3.2, 1.2, 0, Math.PI*2);
        ctx.fill();
    }

    // Skaft (bagud)
    ctx.fillStyle = "#5c3d2e";
    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.lineTo(-10, 14);
    ctx.lineTo(-6, 16);
    ctx.lineTo(-1, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "#4a2e1d";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Aftrækkerbøjle
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 2);
    ctx.lineTo(4, 10);
    ctx.lineTo(2, 10);
    ctx.stroke();

    ctx.restore();
}

function drawShotgun(cx, cy, angle){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    // To løb (over/under)
    ctx.fillStyle = "#444";
    ctx.fillRect(6, -3, 20, 2.5);
    ctx.fillRect(6, 0.5, 20, 2.5);

    // Kolbe (bagud)
    ctx.fillStyle = "#5a4320";
    ctx.beginPath();
    ctx.moveTo(-2, 2);
    ctx.lineTo(-12, 12);
    ctx.lineTo(-8, 14);
    ctx.lineTo(0, 5);
    ctx.closePath();
    ctx.fill();

    // Grib
    ctx.fillStyle = "#5c3d2e";
    ctx.beginPath();
    ctx.moveTo(-2, -2);
    ctx.lineTo(-6, -14);
    ctx.lineTo(-3, -15);
    ctx.lineTo(1, -4);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#222";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
}

function drawSniper(cx, cy, angle){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    // Langt løb + kikkert
    ctx.fillStyle = "#2b2b2b";
    ctx.fillRect(6, -2, 24, 4);
    ctx.fillStyle = "#555";
    ctx.fillRect(26, -1.5, 4, 3);
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(10, -6, 14, 3);

    // Kolbe
    ctx.fillStyle = "#4a3320";
    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.lineTo(-16, 14);
    ctx.lineTo(-12, 16);
    ctx.lineTo(-2, 5);
    ctx.closePath();
    ctx.fill();

    // Benstøtte
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-8, 10);
    ctx.lineTo(-10, 20);
    ctx.moveTo(-4, 11);
    ctx.lineTo(-6, 20);
    ctx.stroke();

    ctx.restore();
}

function drawWeapon(weapon, cx, cy, angle){
    switch(weapon){
        case "revolver": drawRevolver(cx, cy, angle); break;
        case "shotgun": drawShotgun(cx, cy, angle); break;
        case "sniper": drawSniper(cx, cy, angle); break;
    }
}

function drawVignette(){
    const gradient = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, canvas.width*0.5,
        canvas.width/2, canvas.height/2, canvas.width*0.9
    );
    gradient.addColorStop(0, "rgba(0,0,0,0)");
    gradient.addColorStop(1, "rgba(0,0,0,0.35)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrass();
    drawDecorations();

    for(const wall of walls) drawWallShadow(wall);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 4;
    ctx.strokeRect(-camX, -camY, MAP_WIDTH, MAP_HEIGHT);
    for(const wall of walls) drawWall(wall);

    // Kugler
    for(const bullet of bullets){
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath();
        ctx.arc(bullet.x - camX + 2, bullet.y - camY + 2, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowColor = "orange";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#ffd700";
        ctx.beginPath();
        ctx.arc(bullet.x - camX, bullet.y - camY, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
    }

    // Partikler
    for(const p of particles){
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x - camX, p.y - camY, p.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Andre spillere
    for(const id in players){
        if(id === myId) continue;
        const p = players[id];
        const rp = renderPlayers[id];
        if(!rp) continue;
        rp.x = lerp(rp.x, p.x, 0.2);
        rp.y = lerp(rp.y, p.y, 0.2);
        const sx = rp.x - camX;
        const sy = rp.y - camY;

        drawPlayerShadow(sx, sy);
        ctx.fillStyle = "#4a7ebb";
        ctx.fillRect(sx, sy, PLAYER_SIZE, PLAYER_SIZE);
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fillRect(sx+2, sy+2, PLAYER_SIZE-4, PLAYER_SIZE-4);

        // Våben model
        if(typeof p.aimAngle === "number" && p.weapon){
            const cx = rp.x + PLAYER_SIZE/2;
            const cy = rp.y + PLAYER_SIZE/2;
            drawWeapon(p.weapon, cx - camX, cy - camY, p.aimAngle);
        }

        // Navn over HP-bar (større afstand)
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.fillText(p.name || "Player", sx + 15, sy - 22);
        drawHealthBar(p, sx, sy);
    }

    // Mig selv
    const myScreenX = me.x - camX;
    const myScreenY = me.y - camY;
    drawPlayerShadow(myScreenX, myScreenY);
    ctx.fillStyle = "#d22";
    ctx.fillRect(myScreenX, myScreenY, PLAYER_SIZE, PLAYER_SIZE);
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(myScreenX+2, myScreenY+2, PLAYER_SIZE-4, PLAYER_SIZE-4);

    if(keys._mouseX && keys._mouseY){
        const worldMX = keys._mouseX + camX;
        const worldMY = keys._mouseY + camY;
        const centerX = me.x + PLAYER_SIZE/2;
        const centerY = me.y + PLAYER_SIZE/2;
        const aimAngle = Math.atan2(worldMY - centerY, worldMX - centerX);
        drawWeapon(currentWeapon, centerX - camX, centerY - camY, aimAngle);
    }

    if(players[myId]){
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.fillText(players[myId].name || "Player", myScreenX + 15, myScreenY - 22);
        drawHealthBar(players[myId], myScreenX, myScreenY);
    }

    drawVignette();
}

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    keys._mouseX = e.clientX - rect.left;
    keys._mouseY = e.clientY - rect.top;
});

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
