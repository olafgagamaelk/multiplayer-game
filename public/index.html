<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}
canvas{display:block;}
#ui{position:absolute;top:10px;left:10px;z-index:10;}
#nameInput,#saveBtn{padding:8px;}
</style>
</head>
<body>

<div id="ui">
<input id="nameInput" maxlength="12" placeholder="Dit navn">
<button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId=null;
let players={};
let bullets=[];
let renderPlayers={};

const MAP_WIDTH=1400;
const MAP_HEIGHT=900;
const PLAYER_SIZE=30;
const SPEED=2.6;

const me={x:700,y:450};

let camX=0,camY=0;

const keys={};
let lastSend=0;

let mouseX=0,mouseY=0;

function lerp(a,b,t){return a+(b-a)*t;}

const walls = [
    {x:120,y:120,w:220,h:40,r:20},
    {x:450,y:90,w:180,h:40,r:-25},
    {x:850,y:130,w:240,h:40,r:15},
    {x:180,y:300,w:40,h:220,r:35},
    {x:500,y:260,w:280,h:40,r:-15},
    {x:980,y:250,w:40,h:240,r:10},
    {x:250,y:600,w:220,h:40,r:30},
    {x:650,y:540,w:40,h:220,r:-20},
    {x:900,y:650,w:260,h:40,r:12},
    {x:1080,y:430,w:180,h:40,r:-35},
    {x:320,y:430,w:160,h:40,r:45},
    {x:730,y:350,w:170,h:40,r:-40}
];

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

socket.on("id",id=>myId=id);

socket.on("state",data=>{
    players=data.players;
    bullets=data.bullets;

    if(myId){
        if(!players[myId]) players[myId]={};
        players[myId].x=me.x;
        players[myId].y=me.y;
    }
});

document.getElementById("saveBtn").onclick=()=>{
    socket.emit("name",document.getElementById("nameInput").value);
};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.addEventListener("mousemove",e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
});

document.addEventListener("mousedown",()=>{
    const cx=me.x-camX+PLAYER_SIZE/2;
    const cy=me.y-camY+PLAYER_SIZE/2;

    const angle=Math.atan2(mouseY-cy,mouseX-cx);

    socket.emit("shoot",{angle});
});

document.addEventListener("keydown",(e)=>{
    if(e.key==="r") socket.emit("reload");
});

function move(dx,dy){
    const ox=me.x,oy=me.y;
    me.x+=dx;
    me.y+=dy;
}

function update(){

    let moved=false;

    if(keys["w"]){move(0,-SPEED);moved=true;}
    if(keys["s"]){move(0,SPEED);moved=true;}
    if(keys["a"]){move(-SPEED,0);moved=true;}
    if(keys["d"]){move(SPEED,0);moved=true;}

    if(moved && Date.now()-lastSend>50){
        socket.emit("move",{x:me.x,y:me.y});
        lastSend=Date.now();
    }

    camX=lerp(camX,me.x-canvas.width/2+15,0.08);
    camY=lerp(camY,me.y-canvas.height/2+15,0.08);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#57c76d";
    ctx.fillRect(-camX,-camY,MAP_WIDTH,MAP_HEIGHT);

    ctx.fillStyle="red";
    ctx.fillRect(me.x-camX,me.y-camY,PLAYER_SIZE,PLAYER_SIZE);

    for(const id in players){
        if(id===myId) continue;

        const p=players[id];
        const rp=renderPlayers[id]||p;
        renderPlayers[id]=rp;

        rp.x=lerp(rp.x,p.x,0.2);
        rp.y=lerp(rp.y,p.y,0.2);

        ctx.fillStyle="blue";
        ctx.fillRect(rp.x-camX,rp.y-camY,PLAYER_SIZE,PLAYER_SIZE);

        ctx.fillStyle="white";
        ctx.fillText(`${p.name} HP:${p.hp} Ammo:${p.ammo}`,rp.x-camX,rp.y-camY-10);
    }

    ctx.fillStyle="yellow";
    for(const b of bullets){
        ctx.beginPath();
        ctx.arc(b.x-camX,b.y-camY,5,0,Math.PI*2);
        ctx.fill();
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
