<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Simple Multiplayer</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#2ecc71;
    font-family:Arial;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" placeholder="Dit navn">
    <button id="btn">Gem</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let myId = null;
let players = {};

let me = {
    x: 200,
    y: 200
};

let keys = {};
let lastSend = 0;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();

window.addEventListener("resize", resize);

socket.on("id", id=>{
    myId = id;
});

socket.on("state", data=>{

    players = data;

    if(myId && players[myId]){
        me.x = players[myId].x;
        me.y = players[myId].y;
    }
});

document.getElementById("btn").onclick = ()=>{

    socket.emit(
        "name",
        document.getElementById("nameInput").value
    );

};

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

function update(){

    let moved = false;

    if(keys["w"]){
        me.y -= 5;
        moved = true;
    }

    if(keys["s"]){
        me.y += 5;
        moved = true;
    }

    if(keys["a"]){
        me.x -= 5;
        moved = true;
    }

    if(keys["d"]){
        me.x += 5;
        moved = true;
    }

    if(moved && Date.now() - lastSend > 30){

        socket.emit("move",{
            x: me.x,
            y: me.y
        });

        lastSend = Date.now();
    }
}

function draw(){

    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(const id in players){

        const p = players[id];

        ctx.fillStyle =
            id === myId
            ? "red"
            : "blue";

        ctx.fillRect(
            p.x,
            p.y,
            30,
            30
        );

        ctx.fillStyle = "white";
        ctx.font = "14px Arial";

        ctx.fillText(
            p.name,
            p.x,
            p.y - 5
        );
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
