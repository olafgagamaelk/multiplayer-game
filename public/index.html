<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Client Prediction</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #2ecc71;
    font-family: Arial;
}
canvas { display: block; }

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
}
</style>
</head>

<body>

<div id="ui">
    <input id="nameInput" placeholder="navn">
    <button id="btn">save</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let myId = null;
let serverPlayers = {};

let me = {
    x: 200,
    y: 200
};

let keys = {};
let lastSend = 0;

// smooth correction factor
const lerp = (a,b,t) => a + (b-a)*t;

// resize
function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// socket
socket.on("id", id => myId = id);
socket.on("state", data => serverPlayers = data);

// name
document.getElementById("btn").onclick = () => {
    socket.emit("name", document.getElementById("nameInput").value);
};

// input
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ─────────────────────────────
// CLIENT PREDICTION MOVEMENT
// ─────────────────────────────
function update(){

    let moved = false;

    if(keys["w"]){ me.y -= 5; moved = true; }
    if(keys["s"]){ me.y += 5; moved = true; }
    if(keys["a"]){ me.x -= 5; moved = true; }
    if(keys["d"]){ me.x += 5; moved = true; }

    // send to server (NOT waiting for response)
    if(moved && Date.now() - lastSend > 30){
        socket.emit("move", me);
        lastSend = Date.now();
    }
}

// ─────────────────────────────
// DRAW (WITH SMOOTH CORRECTION)
// ─────────────────────────────
function draw(){

    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const id in serverPlayers){

        const p = serverPlayers[id];

        // predicted local player
        if(id === myId){

            // smooth correction toward server position
            me.x = lerp(me.x, p.x, 0.2);
            me.y = lerp(me.y, p.y, 0.2);

            ctx.fillStyle = "red";
            ctx.fillRect(me.x, me.y, 30, 30);

        } else {

            ctx.fillStyle = "blue";
            ctx.fillRect(p.x, p.y, 30, 30);
        }

        ctx.fillStyle = "white";
        ctx.fillText(p.name, p.x, p.y - 5);
    }
}

// ─────────────────────────────
// LOOP
// ─────────────────────────────
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
