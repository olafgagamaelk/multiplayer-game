<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multiplayer</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

#nameInput{
    padding:8px;
    font-size:16px;
}

#saveBtn{
    padding:8px 12px;
    font-size:16px;
}

</style>
</head>
<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Dit navn">
    <button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;

let players = {};
let renderPlayers = {};

const MAP_WIDTH = 1400;
const MAP_HEIGHT = 900;

const PLAYER_SIZE = 30;
const SPEED = 2.6;

const walls = [

{x:100,y:100,w:250,h:40},
{x:450,y:120,w:200,h:40},
{x:850,y:90,w:250,h:40},

{x:150,y:300,w:40,h:220},
{x:400,y:250,w:300,h:40},
{x:800,y:300,w:40,h:250},

{x:1050,y:200,w:40,h:220},
{x:1150,y:450,w:180,h:40},

{x:250,y:650,w:250,h:40},
{x:600,y:550,w:40,h:220},
{x:800,y:650,w:250,h:40},

{x:1050,y:700,w:200,h:40},
{x:1250,y:200,w:40,h:400}

];

const me = {
    x:700,
    y:450
};

const keys = {};

let lastSend = 0;

let camX = 0;
let camY = 0;

function lerp(a,b,t){
    return a + (b-a)*t;
}

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();
window.addEventListener("resize", resize);

socket.on("id", id => {
    myId = id;
});

socket.on("state", data => {

    players = data;

    for(const id in players){

        if(!renderPlayers[id]){

            renderPlayers[id] = {
                x:players[id].x,
                y:players[id].y
            };
        }
    }

    if(myId){

        if(!players[myId]){
            players[myId] = {};
        }

        players[myId].x = me.x;
        players[myId].y = me.y;
    }
});

document.getElementById("saveBtn").onclick = () => {

    socket.emit(
        "name",
        document.getElementById("nameInput").value
    );
};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function rectCollision(a,b){

    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

function movePlayer(dx,dy){

    const oldX = me.x;
    const oldY = me.y;

    me.x += dx;

    for(const wall of walls){

        if(rectCollision(
            {
                x:me.x,
                y:me.y,
                w:PLAYER_SIZE,
                h:PLAYER_SIZE
            },
            wall
        )){
            me.x = oldX;
            break;
        }
    }

    me.y += dy;

    for(const wall of walls){

        if(rectCollision(
            {
                x:me.x,
                y:me.y,
                w:PLAYER_SIZE,
                h:PLAYER_SIZE
            },
            wall
        )){
            me.y = oldY;
            break;
        }
    }
}

function update(){

    let moved = false;

    if(keys["w"]){
        movePlayer(0,-SPEED);
        moved = true;
    }

    if(keys["s"]){
        movePlayer(0,SPEED);
        moved = true;
    }

    if(keys["a"]){
        movePlayer(-SPEED,0);
        moved = true;
    }

    if(keys["d"]){
        movePlayer(SPEED,0);
        moved = true;
    }

    me.x = Math.max(
        0,
        Math.min(MAP_WIDTH - PLAYER_SIZE, me.x)
    );

    me.y = Math.max(
        0,
        Math.min(MAP_HEIGHT - PLAYER_SIZE, me.y)
    );

    if(
        moved &&
        Date.now() - lastSend > 50
    ){

        socket.emit("move",{
            x:me.x,
            y:me.y
        });

        lastSend = Date.now();
    }

    const targetCamX =
        me.x - canvas.width / 2 + PLAYER_SIZE / 2;

    const targetCamY =
        me.y - canvas.height / 2 + PLAYER_SIZE / 2;

    camX = lerp(camX,targetCamX,0.08);
    camY = lerp(camY,targetCamY,0.08);
}

function drawGrass(){

    ctx.fillStyle = "#57c76d";

    ctx.fillRect(
        -camX,
        -camY,
        MAP_WIDTH,
        MAP_HEIGHT
    );

    ctx.strokeStyle =
        "rgba(255,255,255,0.08)";

    ctx.lineWidth = 2;

    for(let x=0;x<MAP_WIDTH;x+=25){

        for(let y=0;y<MAP_HEIGHT;y+=25){

            const px = x - camX;
            const py = y - camY;

            ctx.beginPath();

            ctx.moveTo(px,py+4);
            ctx.lineTo(px+2,py-4);

            ctx.stroke();
        }
    }
}

function drawWall(wall){

    ctx.fillStyle = "#7d7d7d";

    ctx.fillRect(
        wall.x - camX,
        wall.y - camY,
        wall.w,
        wall.h
    );

    ctx.fillStyle = "#999";

    for(
        let x=wall.x;
        x<wall.x+wall.w;
        x+=25
    ){

        ctx.fillRect(
            x - camX,
            wall.y - camY,
            3,
            wall.h
        );
    }

    ctx.strokeStyle = "#555";

    ctx.strokeRect(
        wall.x - camX,
        wall.y - camY,
        wall.w,
        wall.h
    );
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrass();

    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;

    ctx.strokeRect(
        -camX,
        -camY,
        MAP_WIDTH,
        MAP_HEIGHT
    );

    for(const wall of walls){
        drawWall(wall);
    }

    ctx.fillStyle = "red";

    ctx.fillRect(
        me.x - camX,
        me.y - camY,
        PLAYER_SIZE,
        PLAYER_SIZE
    );

    if(players[myId]){

        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            players[myId].name || "Player",
            me.x - camX + 15,
            me.y - camY - 10
        );
    }

    for(const id in players){

        if(id === myId) continue;

        const p = players[id];
        const rp = renderPlayers[id];

        if(!rp) continue;

        rp.x = lerp(rp.x,p.x,0.2);
        rp.y = lerp(rp.y,p.y,0.2);

        ctx.fillStyle = "blue";

        ctx.fillRect(
            rp.x - camX,
            rp.y - camY,
            PLAYER_SIZE,
            PLAYER_SIZE
        );

        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            p.name || "Player",
            rp.x - camX + 15,
            rp.y - camY - 10
        );
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
