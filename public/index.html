<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}
canvas{
    display:block;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
#nameInput{
    padding:8px;
}
#saveBtn{
    padding:8px 12px;
}
</style>
</head>
<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Dit navn">
    <button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;
let players = {};
let renderPlayers = {};
let bullets = [];                 // <-- NYT

const MAP_WIDTH = 1400;
const MAP_HEIGHT = 900;

const PLAYER_SIZE = 30;
const SPEED = 2.6;

// r = rotation i grader
const walls = [
    {x:120,y:120,w:220,h:40,r:20},
    {x:450,y:90,w:180,h:40,r:-25},
    {x:850,y:130,w:240,h:40,r:15},
    {x:180,y:300,w:40,h:220,r:35},
    {x:500,y:260,w:280,h:40,r:-15},
    {x:980,y:250,w:40,h:240,r:10},
    {x:250,y:600,w:220,h:40,r:30},
    {x:650,y:540,w:40,h:220,r:-20},
    {x:900,y:650,w:260,h:40,r:12},
    {x:1080,y:430,w:180,h:40,r:-35},
    {x:320,y:430,w:160,h:40,r:45},
    {x:730,y:350,w:170,h:40,r:-40}
];

const me = { x:700, y:450 };

let camX = 0;
let camY = 0;

const keys = {};
let lastSend = 0;
let lastShoot = 0;               // <-- NYT (cooldown)

function lerp(a,b,t){
    return a + (b-a)*t;
}

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

socket.on("id", id => myId = id);

socket.on("state", data => {
    // data indeholder nu både players og bullets
    players = data.players || {};
    bullets = data.bullets || [];

    for(const id in players){
        if(!renderPlayers[id]){
            renderPlayers[id] = {
                x: players[id].x,
                y: players[id].y
            };
        }
    }

    // Håndter vores egen position (respawn m.m.)
    if(myId && players[myId]){
        const serverMe = players[myId];
        const dx = serverMe.x - me.x;
        const dy = serverMe.y - me.y;
        if(Math.sqrt(dx*dx+dy*dy) > 60){
            // tydelig teleport → respektér server
            me.x = serverMe.x;
            me.y = serverMe.y;
        }
        // Overskriv serverens position med vores lokale (prediction)
        // men behold hp, name osv.
        players[myId].x = me.x;
        players[myId].y = me.y;
    }
});

document.getElementById("saveBtn").onclick = () => {
    socket.emit("name", document.getElementById("nameInput").value);
};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

// ---------- NYT: skyd med musen ----------
canvas.addEventListener("mousedown", e => {
    if(Date.now() - lastShoot < 500) return;   // 0,5 sek. cooldown
    lastShoot = Date.now();

    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    // mus i spilverden
    const worldMX = mouseX + camX;
    const worldMY = mouseY + camY;

    // spillerens centrum
    const centerX = me.x + PLAYER_SIZE/2;
    const centerY = me.y + PLAYER_SIZE/2;

    const angle = Math.atan2(worldMY - centerY, worldMX - centerX);
    socket.emit("shoot", angle);
});

// --- RIGTIG ROTERET COLLISION ---
function pointInRotatedRect(px, py, wall){

    const cx = wall.x + wall.w/2;
    const cy = wall.y + wall.h/2;

    const rad = -wall.r * Math.PI / 180;

    const dx = px - cx;
    const dy = py - cy;

    const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
    const localY = dx * Math.sin(rad) + dy * Math.cos(rad);

    return (
        localX > -wall.w/2 &&
        localX <  wall.w/2 &&
        localY > -wall.h/2 &&
        localY <  wall.h/2
    );
}

function playerHitsWall(x,y){

    const points = [
        [x,y],
        [x+PLAYER_SIZE,y],
        [x,y+PLAYER_SIZE],
        [x+PLAYER_SIZE,y+PLAYER_SIZE]
    ];

    for(const wall of walls){

        for(const p of points){

            if(pointInRotatedRect(p[0],p[1],wall)){
                return true;
            }
        }
    }

    return false;
}

function movePlayer(dx,dy){

    const oldX = me.x;
    const oldY = me.y;

    me.x += dx;

    if(playerHitsWall(me.x, me.y)){
        me.x = oldX;
    }

    me.y += dy;

    if(playerHitsWall(me.x, me.y)){
        me.y = oldY;
    }
}

function update(){

    let moved = false;

    if(keys["w"]){ movePlayer(0,-SPEED); moved = true; }
    if(keys["s"]){ movePlayer(0, SPEED); moved = true; }
    if(keys["a"]){ movePlayer(-SPEED,0); moved = true; }
    if(keys["d"]){ movePlayer( SPEED,0); moved = true; }

    me.x = Math.max(
        0,
        Math.min(MAP_WIDTH - PLAYER_SIZE, me.x)
    );

    me.y = Math.max(
        0,
        Math.min(MAP_HEIGHT - PLAYER_SIZE, me.y)
    );

    if(
        moved &&
        Date.now() - lastSend > 50
    ){

        socket.emit("move",{
            x: me.x,
            y: me.y
        });

        lastSend = Date.now();
    }

    const targetCamX =
        me.x - canvas.width/2 + PLAYER_SIZE/2;

    const targetCamY =
        me.y - canvas.height/2 + PLAYER_SIZE/2;

    camX = lerp(camX,targetCamX,0.08);
    camY = lerp(camY,targetCamY,0.08);
}

// græstekstur
function drawGrass(){

    ctx.fillStyle = "#57c76d";
    ctx.fillRect(
        -camX,
        -camY,
        MAP_WIDTH,
        MAP_HEIGHT
    );

    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;

    for(let x=0;x<MAP_WIDTH;x+=24){

        for(let y=0;y<MAP_HEIGHT;y+=24){

            const px = x - camX;
            const py = y - camY;

            ctx.beginPath();
            ctx.moveTo(px,py+3);
            ctx.lineTo(px+1,py-3);
            ctx.stroke();
        }
    }
}

function drawWall(wall){

    ctx.save();

    ctx.translate(
        wall.x + wall.w/2 - camX,
        wall.y + wall.h/2 - camY
    );

    ctx.rotate(
        wall.r * Math.PI / 180
    );

    ctx.fillStyle = "#7f7f7f";

    ctx.fillRect(
        -wall.w/2,
        -wall.h/2,
        wall.w,
        wall.h
    );

    // lille tekstur
    ctx.fillStyle = "#9a9a9a";

    for(let x=-wall.w/2; x<wall.w/2; x+=20){

        ctx.fillRect(
            x,
            -wall.h/2,
            3,
            wall.h
        );
    }

    ctx.strokeStyle = "#5a5a5a";
    ctx.lineWidth = 2;

    ctx.strokeRect(
        -wall.w/2,
        -wall.h/2,
        wall.w,
        wall.h
    );

    ctx.restore();
}

// ---------- NYT: tegn health bar ----------
function drawHealthBar(p, screenX, screenY) {
    if (typeof p.hp !== "number") return;
    const hp = Math.max(0, p.hp);
    const w = PLAYER_SIZE;
    const h = 6;
    const x = screenX;
    const y = screenY - 14;

    // baggrund
    ctx.fillStyle = "#333";
    ctx.fillRect(x, y, w, h);
    // fyld
    const fill = (hp / 100) * w;
    ctx.fillStyle = hp > 30 ? "#0f0" : "#f00";
    ctx.fillRect(x, y, fill, h);
    // kant
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrass();

    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;

    ctx.strokeRect(
        -camX,
        -camY,
        MAP_WIDTH,
        MAP_HEIGHT
    );

    for(const wall of walls){
        drawWall(wall);
    }

    // ---------- NYT: tegn kugler ----------
    for(const bullet of bullets){
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(
            bullet.x - camX,
            bullet.y - camY,
            4,
            0,
            Math.PI*2
        );
        ctx.fill();
    }

    // mig selv
    const myScreenX = me.x - camX;
    const myScreenY = me.y - camY;
    ctx.fillStyle = "red";
    ctx.fillRect(
        myScreenX,
        myScreenY,
        PLAYER_SIZE,
        PLAYER_SIZE
    );

    if(players[myId]){
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText(
            players[myId].name || "Player",
            me.x - camX + 15,
            me.y - camY - 10
        );
        drawHealthBar(players[myId], myScreenX, myScreenY);
    }

    // andre spillere
    for(const id in players){
        if(id === myId) continue;

        const p = players[id];
        const rp = renderPlayers[id];
        if(!rp) continue;

        rp.x = lerp(rp.x,p.x,0.2);
        rp.y = lerp(rp.y,p.y,0.2);

        const sx = rp.x - camX;
        const sy = rp.y - camY;
        ctx.fillStyle = "blue";
        ctx.fillRect(sx, sy, PLAYER_SIZE, PLAYER_SIZE);

        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText(
            p.name || "Player",
            sx + 15,
            sy - 10
        );

        drawHealthBar(p, sx, sy);
    }

    // ---------- NYT: vis egen HP i hjørnet ----------
    if(myId && players[myId]){
        ctx.fillStyle = "white";
        ctx.font = "bold 18px Arial";
        ctx.textAlign = "left";
        ctx.fillText("HP: " + players[myId].hp, 20, canvas.height - 20);
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
