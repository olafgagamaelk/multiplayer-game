<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Baseplate</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<div id="ui">
    <input id="name" placeholder="Navn" maxlength="16">
    <button onclick="setName()">Gem</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let players = {};
let myId = null;

const me = { x: 100, y: 100, speed: 4 };
const keys = {};

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
};

socket.on("yourId", id => myId = id);

socket.on("players", data => {
    players = data;

    if (myId && players[myId]) {
        me.x = players[myId].x;
        me.y = players[myId].y;
    }
});

socket.on("serverFull", () => {
    document.body.innerHTML = "<h1>Server er fuld (max 2 spillere)</h1>";
});

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function setName() {
    const name = document.getElementById("name").value;
    socket.emit("setName", name);
}

function update() {
    let moved = false;

    if (keys["w"]) { me.y -= me.speed; moved = true; }
    if (keys["s"]) { me.y += me.speed; moved = true; }
    if (keys["a"]) { me.x -= me.speed; moved = true; }
    if (keys["d"]) { me.x += me.speed; moved = true; }

    if (moved) {
        socket.emit("move", { x: me.x, y: me.y });
    }
}

function drawGrid() {
    ctx.strokeStyle = "rgba(255,255,255,0.15)";

    for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    for (let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

function draw() {
    ctx.fillStyle = "#55bb55";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();

    for (let id in players) {
        const p = players[id];

        ctx.fillStyle = id === myId ? "red" : "blue";
        ctx.fillRect(p.x, p.y, 40, 40);

        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(p.name, p.x + 20, p.y - 8);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
