<!-- public/index.html -->
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer</title>

<style>
body{ margin:0; overflow:hidden; font-family:Arial; }
canvas{ display:block; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
}

#nameInput{ padding:8px; }
#saveBtn{ padding:8px 12px; }
</style>
</head>

<body>

<div id="ui">
  <input id="nameInput" maxlength="12" placeholder="Dit navn">
  <button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;
let players = {};
let renderPlayers = {};
let bullets = [];

const MAP_WIDTH = 1400;
const MAP_HEIGHT = 900;
const PLAYER_SIZE = 30;
const SPEED = 2.6;

const me = { x:700, y:450 };
let camX = 0;
let camY = 0;

const keys = {};
let lastSend = 0;
let lastShot = 0;

function lerp(a,b,t){ return a + (b-a)*t; }

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

socket.on("id", id => myId = id);

// SERVER STATE (nu med bullets)
socket.on("state", data => {
  players = data.players;
  bullets = data.bullets;

  for(const id in players){
    if(!renderPlayers[id]){
      renderPlayers[id] = { x: players[id].x, y: players[id].y };
    }
  }

  if(myId && players[myId]){
    me.x = players[myId].x;
    me.y = players[myId].y;
  }
});

document.getElementById("saveBtn").onclick = () => {
  socket.emit("name", document.getElementById("nameInput").value);
};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  // SKYD MED SPACE
  if(e.key === " "){
    shoot();
  }
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// SKUD
function shoot(){
  if(Date.now() - lastShot < 300) return;
  lastShot = Date.now();

  // retning mod mus
  const dx = mouse.x - (me.x - camX);
  const dy = mouse.y - (me.y - camY);
  const len = Math.sqrt(dx*dx + dy*dy);

  const speed = 6;

  socket.emit("shoot", {
    vx: (dx / len) * speed,
    vy: (dy / len) * speed
  });
}

// mus
const mouse = { x:0, y:0 };
window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// movement
function movePlayer(dx,dy){
  me.x += dx;
  me.y += dy;
}

function update(){
  let moved = false;

  if(keys["w"]){ movePlayer(0,-SPEED); moved = true; }
  if(keys["s"]){ movePlayer(0,SPEED); moved = true; }
  if(keys["a"]){ movePlayer(-SPEED,0); moved = true; }
  if(keys["d"]){ movePlayer(SPEED,0); moved = true; }

  if(moved && Date.now() - lastSend > 50){
    socket.emit("move",{ x: me.x, y: me.y });
    lastSend = Date.now();
  }

  camX = lerp(camX, me.x - canvas.width/2, 0.08);
  camY = lerp(camY, me.y - canvas.height/2, 0.08);
}

// draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // spillere
  for(const id in players){
    const p = players[id];

    ctx.fillStyle = (id === myId) ? "red" : "blue";
    ctx.fillRect(p.x - camX, p.y - camY, PLAYER_SIZE, PLAYER_SIZE);

    ctx.fillStyle = "white";
    ctx.fillText(p.name || "Player", p.x - camX, p.y - camY - 10);
  }

  // bullets
  ctx.fillStyle = "yellow";
  for(const b of bullets){
    ctx.beginPath();
    ctx.arc(b.x - camX, b.y - camY, 4, 0, Math.PI*2);
    ctx.fill();
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
