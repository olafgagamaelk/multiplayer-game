<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multiplayer</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#2ecc71;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

#nameInput{
    padding:8px;
    font-size:16px;
}

#saveBtn{
    padding:8px 12px;
    font-size:16px;
}

</style>
</head>
<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Dit navn">
    <button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;

let players = {};
let renderPlayers = {};

const MAP_WIDTH = 3000;
const MAP_HEIGHT = 3000;

const PLAYER_SIZE = 30;
const SPEED = 3;

const walls = [

    {x:500,y:400,w:300,h:40},
    {x:1000,y:900,w:40,h:300},
    {x:1700,y:700,w:400,h:40},
    {x:2200,y:1300,w:40,h:300},
    {x:1200,y:1800,w:500,h:40},
    {x:600,y:2200,w:40,h:350},
    {x:2000,y:2200,w:500,h:40},
    {x:2500,y:500,w:40,h:500}

];

const me = {
    x:1500,
    y:1500
};

const keys = {};

let lastSend = 0;

function lerp(a,b,t){
    return a + (b-a)*t;
}

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();
window.addEventListener("resize", resize);

socket.on("id", id => {
    myId = id;
});

socket.on("state", data => {

    players = data;

    for(const id in players){

        if(!renderPlayers[id]){

            renderPlayers[id] = {
                x:players[id].x,
                y:players[id].y
            };
        }
    }

    if(myId){

        if(!players[myId]){
            players[myId] = {};
        }

        players[myId].x = me.x;
        players[myId].y = me.y;
    }
});

document.getElementById("saveBtn").onclick = () => {

    socket.emit(
        "name",
        document.getElementById("nameInput").value
    );
};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function rectCollision(a,b){

    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

function movePlayer(dx,dy){

    const oldX = me.x;
    const oldY = me.y;

    me.x += dx;

    for(const wall of walls){

        if(rectCollision(
            {
                x:me.x,
                y:me.y,
                w:PLAYER_SIZE,
                h:PLAYER_SIZE
            },
            wall
        )){
            me.x = oldX;
            break;
        }
    }

    me.y += dy;

    for(const wall of walls){

        if(rectCollision(
            {
                x:me.x,
                y:me.y,
                w:PLAYER_SIZE,
                h:PLAYER_SIZE
            },
            wall
        )){
            me.y = oldY;
            break;
        }
    }
}

function update(){

    let moved = false;

    if(keys["w"]){
        movePlayer(0,-SPEED);
        moved = true;
    }

    if(keys["s"]){
        movePlayer(0,SPEED);
        moved = true;
    }

    if(keys["a"]){
        movePlayer(-SPEED,0);
        moved = true;
    }

    if(keys["d"]){
        movePlayer(SPEED,0);
        moved = true;
    }

    me.x = Math.max(
        0,
        Math.min(MAP_WIDTH - PLAYER_SIZE, me.x)
    );

    me.y = Math.max(
        0,
        Math.min(MAP_HEIGHT - PLAYER_SIZE, me.y)
    );

    if(
        moved &&
        Date.now() - lastSend > 50
    ){

        socket.emit("move",{
            x:me.x,
            y:me.y
        });

        lastSend = Date.now();
    }
}

function draw(){

    const camX =
        me.x - canvas.width/2;

    const camY =
        me.y - canvas.height/2;

    ctx.fillStyle="#2ecc71";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // map border

    ctx.strokeStyle="white";
    ctx.lineWidth=5;

    ctx.strokeRect(
        -camX,
        -camY,
        MAP_WIDTH,
        MAP_HEIGHT
    );

    // walls

    ctx.fillStyle="#888";

    for(const wall of walls){

        ctx.fillRect(
            wall.x - camX,
            wall.y - camY,
            wall.w,
            wall.h
        );
    }

    // me

    ctx.fillStyle="red";

    ctx.fillRect(
        me.x - camX,
        me.y - camY,
        PLAYER_SIZE,
        PLAYER_SIZE
    );

    if(players[myId]){

        ctx.fillStyle="white";
        ctx.textAlign="center";

        ctx.fillText(
            players[myId].name || "Player",
            me.x - camX + 15,
            me.y - camY - 10
        );
    }

    // others

    for(const id in players){

        if(id === myId) continue;

        const p = players[id];
        const rp = renderPlayers[id];

        if(!rp) continue;

        rp.x = lerp(rp.x,p.x,0.2);
        rp.y = lerp(rp.y,p.y,0.2);

        ctx.fillStyle="blue";

        ctx.fillRect(
            rp.x - camX,
            rp.y - camY,
            PLAYER_SIZE,
            PLAYER_SIZE
        );

        ctx.fillStyle="white";

        ctx.fillText(
            p.name || "Player",
            rp.x - camX + 15,
            rp.y - camY - 10
        );
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
