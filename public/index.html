<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}
canvas{
    display:block;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
#nameInput{
    padding:8px;
}
#saveBtn{
    padding:8px 12px;
}
</style>
</head>
<body>

<div id="ui">
    <input id="nameInput" maxlength="12" placeholder="Dit navn">
    <button id="saveBtn">Gem navn</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;
let players = {};
let bullets = {};
let renderPlayers = {};

const MAP_WIDTH = 1400;
const MAP_HEIGHT = 900;
const PLAYER_SIZE = 30;
const SPEED = 2.6;

const walls = [ /* DIN LISTE BEHOLDES UÆNDRET */ 
];

const me = { x: 700, y: 450 };
let camX = 0;
let camY = 0;

const keys = {};
let lastSend = 0;

let mouseX = 0;
let mouseY = 0;

function lerp(a,b,t){ return a + (b-a)*t; }

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

socket.on("id", id => myId = id);

// STATE MODTAGES (players + bullets)
socket.on("state", data => {
  players = data.players || {};
  bullets = data.bullets || [];

  for(const id in players){
    if(!renderPlayers[id]){
      renderPlayers[id] = { x: players[id].x, y: players[id].y };
    }
  }

  if(myId && players[myId]){
    me.x = players[myId].x;
    me.y = players[myId].y;
  }
});

document.getElementById("saveBtn").onclick = () => {
  socket.emit("name", document.getElementById("nameInput").value);
};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});
document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// 🎯 MUS POSITION
canvas.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 🔫 SKYD
canvas.addEventListener("mousedown", () => {
  const angle = Math.atan2(
    mouseY - canvas.height / 2,
    mouseX - canvas.width / 2
  );

  socket.emit("shoot", { angle });
});

// --- movement + collision (uændret)
function pointInRotatedRect(px, py, wall){
  const cx = wall.x + wall.w/2;
  const cy = wall.y + wall.h/2;
  const rad = -wall.r * Math.PI / 180;

  const dx = px - cx;
  const dy = py - cy;

  const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
  const localY = dx * Math.sin(rad) + dy * Math.cos(rad);

  return (
    localX > -wall.w/2 && localX < wall.w/2 &&
    localY > -wall.h/2 && localY < wall.h/2
  );
}

function playerHitsWall(x,y){
  const points = [
    [x,y],
    [x+PLAYER_SIZE,y],
    [x,y+PLAYER_SIZE],
    [x+PLAYER_SIZE,y+PLAYER_SIZE]
  ];

  for(const wall of walls){
    for(const p of points){
      if(pointInRotatedRect(p[0],p[1],wall)){
        return true;
      }
    }
  }
  return false;
}

function movePlayer(dx,dy){
  const oldX = me.x;
  const oldY = me.y;

  me.x += dx;
  if(playerHitsWall(me.x, me.y)) me.x = oldX;

  me.y += dy;
  if(playerHitsWall(me.x, me.y)) me.y = oldY;
}

function update(){
  let moved = false;

  if(keys["w"]){ movePlayer(0,-SPEED); moved = true; }
  if(keys["s"]){ movePlayer(0,SPEED); moved = true; }
  if(keys["a"]){ movePlayer(-SPEED,0); moved = true; }
  if(keys["d"]){ movePlayer(SPEED,0); moved = true; }

  if(moved && Date.now() - lastSend > 50){
    socket.emit("move",{ x: me.x, y: me.y });
    lastSend = Date.now();
  }

  camX = lerp(camX, me.x - canvas.width/2, 0.08);
  camY = lerp(camY, me.y - canvas.height/2, 0.08);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#57c76d";
  ctx.fillRect(-camX, -camY, MAP_WIDTH, MAP_HEIGHT);

  // bullets 🔫
  ctx.fillStyle = "yellow";
  for(const b of bullets){
    ctx.beginPath();
    ctx.arc(b.x - camX, b.y - camY, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // mig
  ctx.fillStyle = "red";
  ctx.fillRect(me.x - camX, me.y - camY, PLAYER_SIZE, PLAYER_SIZE);

  // andre
  for(const id in players){
    if(id === myId) continue;

    const p = players[id];
    const rp = renderPlayers[id];
    if(!rp) continue;

    rp.x = lerp(rp.x, p.x, 0.2);
    rp.y = lerp(rp.y, p.y, 0.2);

    ctx.fillStyle = "blue";
    ctx.fillRect(rp.x - camX, rp.y - camY, PLAYER_SIZE, PLAYER_SIZE);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
